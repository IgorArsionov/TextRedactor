name: Build Mac DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-13  # Intel Mac

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build project
        run: ./mvnw clean package

      - name: Download JavaFX jmods
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/25.0.2/openjfx-25.0.2_osx-x64_bin-jmods.zip
          unzip javafx.zip

      - name: Build app-image
        run: |
          jpackage \
            --type app-image \
            --name "TextRedactor" \
            --input target \
            --main-jar TextRedactor-2.0-SNAPSHOT.jar \
            --main-class com.example.textredactor.App \
            --module-path "$JAVA_HOME/jmods:javafx-jmods-25.0.2" \
            --add-modules javafx.controls,javafx.fxml \
            --dest output

      - name: Build dmg
        run: |
          jpackage \
            --type dmg \
            --name "TextRedactor" \
            --app-image output/TextRedactor.app \
            --dest output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextRedactor-mac-intel
          path: output/*.dmg