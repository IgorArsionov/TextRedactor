name: Build Mac DMG (Intel)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac-intel:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Build project (Maven)
        run: ./mvnw clean package -DskipTests

      - name: Download JavaFX 21 jmods (LTS)
        run: |
          curl -L -o javafx-jmods.zip \
            https://download2.gluonhq.com/openjfx/21.0.5/openjfx-21.0.5_osx-x64_bin-jmods.zip
          unzip javafx-jmods.zip -d javafx-jmods

      - name: Create custom runtime with jlink
        run: |
          jlink \
            --module-path "$JAVA_HOME/jmods:javafx-jmods/javafx-jmods-21.0.5" \
            --add-modules java.base,javafx.controls,javafx.fxml,javafx.graphics \
            --output custom-runtime \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2

      - name: Package app-image with jpackage
        run: |
          jpackage \
            --type app-image \
            --name "TextRedactor" \
            --input target \
            --main-jar TextRedactor-2.0-SNAPSHOT.jar \
            --main-class com.example.textredactor.App \
            --runtime-image custom-runtime \
            --resource-dir resources \
            --dest output \
            --verbose

      - name: Package DMG
        run: |
          jpackage \
            --type dmg \
            --name "TextRedactor" \
            --app-image output/TextRedactor.app \
            --resource-dir resources \
            --dest output \
            --verbose

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: TextRedactor-mac-intel-dmg
          path: output/*.dmg
          retention-days: 7
